<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HXH Power 销售系统</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f8f7f4;--bg3:#f0ede9;
  --bdr:#e4e1db;--bdr2:#ccc8c1;
  --t1:#1c1b18;--t2:#6b6866;--t3:#aaa8a3;
  --acc:#c0392b;--acc2:#a93226;
  --grn:#0f6e56;--org:#854f0b;--blu:#185fa5;
  --r:8px;--rl:12px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 8px 24px rgba(0,0,0,.13),0 2px 6px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg2);color:var(--t1);font-size:14px;line-height:1.5;min-height:100vh}

.hdr{background:#fff;border-bottom:1px solid var(--bdr);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:50}
.hdr-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:var(--t1)}
.logo-icon{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);background:var(--bg2);padding:4px 12px;border-radius:20px;border:1px solid var(--bdr)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sdot.on{background:#22c55e}.sdot.sync{background:#f59e0b}

.nav{background:#fff;border-bottom:1px solid var(--bdr);padding:0 24px;display:flex}
.ntab{padding:11px 16px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:6px;transition:color .15s}
.ntab:hover{color:var(--t1)}.ntab.active{color:var(--acc);border-bottom-color:var(--acc)}
.ntab i{font-size:15px}

.main{max-width:1280px;margin:0 auto;padding:24px}
.section{display:none}.section.active{display:block}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric{background:#fff;border:1px solid var(--bdr);border-radius:var(--rl);padding:16px 20px;box-shadow:var(--sh)}
.mv{font-size:26px;font-weight:700;line-height:1;margin-bottom:5px}
.ml{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)}

.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--rl);box-shadow:var(--sh);margin-bottom:16px;overflow:hidden}
.card-body{padding:20px 24px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--bdr)}
.ct{font-size:14px;font-weight:600;color:var(--t1)}

.tb{display:flex;gap:10px;align-items:center;padding:14px 24px;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.si{flex:1;min-width:180px}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:9px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);background:var(--bg2);border-bottom:1px solid var(--bdr)}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--bg2)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.td-sub{font-size:11px;color:var(--t2);margin-top:2px}

.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-new{background:#e6f5d8;color:#2d6008}
.badge-warm{background:#fef3e2;color:#854f0b}
.badge-hot{background:#fde8e8;color:#a32d2d}
.badge-won{background:#e0f5ee;color:#0d6149}
.badge-lost{background:#f0ede8;color:#5f5e5a}
.badge-dealer{background:#eeecfe;color:#3c3489}
.badge-project{background:#e6f0fb;color:#185fa5}
.badge-instock{background:#e6f5d8;color:#2d6008}
.badge-low{background:#fef3e2;color:#854f0b}
.badge-out{background:#fde8e8;color:#a32d2d}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:13px;font-weight:500;border:1px solid var(--bdr2);border-radius:var(--r);background:#fff;cursor:pointer;color:var(--t1);transition:all .15s;white-space:nowrap;line-height:1.3}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-primary:hover{background:var(--acc2);border-color:var(--acc2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--bg3);border-color:var(--bdr)}
.btn-danger{color:var(--acc)}.btn-danger:hover{background:#fde8e8;border-color:#fbb}

.qc{display:flex;align-items:center;gap:8px}
.qb{width:26px;height:26px;border:1px solid var(--bdr2);border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--t2);line-height:1;transition:all .15s;padding:0}
.qb:hover{background:var(--bg3)}.qv{font-weight:700;min-width:22px;text-align:center}

input,select,textarea{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--r);background:#fff;color:var(--t1);font-family:inherit;transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
label{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px;display:block}
.fg{display:flex;flex-direction:column}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fcol{display:flex;flex-direction:column;gap:14px}

.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;animation:fi .15s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--rl);padding:24px;width:520px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:var(--sh2);animation:su .2s ease}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt{font-size:16px;font-weight:700;color:var(--t1)}
.mx{width:28px;height:28px;border:none;background:var(--bg2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);line-height:1;transition:all .15s}
.mx:hover{background:var(--bg3);color:var(--t1)}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)}

.ql{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.qrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.qrow:last-child{border-bottom:none}
.qtotal{display:flex;justify-content:space-between;align-items:center;padding:14px 0;font-size:15px;font-weight:700;margin-top:4px;border-top:2px solid var(--bdr)}

.ai{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.ai:last-child{border-bottom:none}
.adot{width:8px;height:8px;border-radius:50%;background:var(--acc);margin-top:5px;flex-shrink:0}
.atime{font-size:11px;color:var(--t3);white-space:nowrap}

.due-now{color:#a32d2d;font-weight:600}
.price{font-family:'SF Mono',Menlo,monospace;font-size:13px;font-weight:500}
.empty{padding:40px;text-align:center;color:var(--t3);font-size:13px}

/* Document type tabs */
.doc-tabs{display:flex;gap:4px;flex-wrap:wrap}
.dtab{padding:5px 10px;font-size:11px;font-weight:600;border:1px solid var(--bdr2);border-radius:6px;background:#fff;cursor:pointer;color:var(--t2);transition:all .15s;white-space:nowrap}
.dtab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.dtab:hover:not(.active){background:var(--bg2)}

/* Document preview */
.doc{font-family:'Times New Roman',Georgia,serif;font-size:12.5px;line-height:1.6;color:#1a1a1a}
.doc-lh{border-bottom:2px solid #c0392b;padding-bottom:10px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end}
.doc-co{font-size:17px;font-weight:700;color:#c0392b;letter-spacing:.3px}
.doc-h1{font-size:14px;font-weight:700;text-align:center;letter-spacing:2px;margin:14px 0;text-transform:uppercase;border-top:1px solid #ccc;border-bottom:1px solid #ccc;padding:7px 0}
.doc-parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:14px 0;font-size:12px}
.dp-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#999;border-bottom:1px solid #ddd;padding-bottom:3px;margin-bottom:6px}
.doc-tb{width:100%;border-collapse:collapse;margin:14px 0;font-size:12px}
.doc-tb th{background:#f0ede9;padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:1px solid #ccc}
.doc-tb td{padding:7px 10px;border:1px solid #ccc;vertical-align:top}
.doc-tb td.r{text-align:right;font-family:'Courier New',monospace}
.doc-totals{float:right;width:300px;font-size:12px;margin-top:4px}
.dtr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee;font-size:12px}
.dtr.final{font-size:14px;font-weight:700;border-top:2px solid #333;border-bottom:none;padding-top:8px;margin-top:4px}
.doc-kv{display:grid;grid-template-columns:160px 1fr;gap:3px 0;font-size:11.5px}
.doc-kv span:nth-child(odd){font-weight:600}
.doc-bank{background:#f8f7f4;border:1px solid #e4e1db;border-radius:6px;padding:12px 14px;margin-top:10px;font-size:11.5px;line-height:1.8}
.doc-notice{background:#fef3e2;border-left:3px solid #f59e0b;padding:8px 14px;font-size:11.5px;margin-bottom:14px;border-radius:0 4px 4px 0}
.doc-cert{border:1px solid #ddd;border-radius:6px;padding:10px 14px;margin-top:6px;font-size:11.5px;font-style:italic;color:#555}
.doc-sign{border-top:1px solid #333;padding-top:4px;min-width:200px;text-align:center;font-size:11px}

/* Inventory image thumbnail */
.inv-thumb{width:52px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--bdr);cursor:pointer;display:block}
.inv-thumb-ph{width:52px;height:40px;background:var(--bg3);border-radius:4px;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:18px;cursor:default}
/* Image preview modal */
.img-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:500;cursor:pointer}
.img-preview-overlay img{max-width:90vw;max-height:88vh;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}

@media(max-width:768px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .fgrid{grid-template-columns:1fr}
  .main{padding:16px}
  .ql{grid-template-columns:1fr}
  .hdr,.nav{padding:0 16px}
}
</style>
</head>
<body>

<!-- 密码保护 -->
<div id="pw-overlay" style="position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="background:#fff;border-radius:16px;padding:40px 48px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:380px;max-width:92vw;text-align:center;border:1px solid #e4e1db">
    <div style="width:52px;height:52px;background:#c0392b;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px">🔒</div>
    <h1 style="font-size:20px;font-weight:700;color:#1c1b18;margin-bottom:6px">HXH Power 销售系统</h1>
    <p style="font-size:13px;color:#6b6866;margin-bottom:24px">请输入访问密码继续</p>
    <input id="pw-input" type="password" placeholder="输入密码" autocomplete="current-password"
      style="width:100%;padding:10px 14px;font-size:14px;border:1.5px solid #ccc8c1;border-radius:8px;outline:none;margin-bottom:8px;font-family:inherit;transition:border-color .2s"
      onkeydown="if(event.key==='Enter')checkPw()"
      onfocus="this.style.borderColor='#c0392b';this.style.boxShadow='0 0 0 3px rgba(192,57,43,.1)'"
      onblur="this.style.borderColor='#ccc8c1';this.style.boxShadow='none'">
    <div id="pw-error" style="color:#c0392b;font-size:12px;margin-bottom:10px;min-height:18px;text-align:left"></div>
    <button onclick="checkPw()"
      style="width:100%;padding:11px;font-size:14px;font-weight:600;background:#c0392b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit"
      onmouseover="this.style.background='#a93226'" onmouseout="this.style.background='#c0392b'">
      进入系统
    </button>
  </div>
</div>
<script>
(function(){
  var PASS='hxh2026',tries=0;
  window.checkPw=function(){
    var v=document.getElementById('pw-input').value;
    if(v===PASS){
      document.getElementById('pw-overlay').style.display='none';
      document.getElementById('app').style.display='block';
      if(window._appReady)window._appReady();
    }else{
      tries++;
      document.getElementById('pw-error').textContent='密码错误，请重试';
      document.getElementById('pw-input').value='';
      document.getElementById('pw-input').focus();
    }
  };
  document.addEventListener('DOMContentLoaded',function(){document.getElementById('pw-input').focus();});
})();
</script>

<!-- 主应用（密码通过后显示） -->
<div id="app" style="display:none">

  <header class="hdr">
    <div class="hdr-logo">
      <div class="logo-icon">⚡</div>
      HXH Power 销售系统
    </div>
    <div class="sync-badge">
      <div class="sdot" id="sdot"></div>
      <span id="slabel">本地</span>
    </div>
  </header>

  <nav class="nav">
    <button class="ntab active" onclick="switchTab('leads')"><i class="ti ti-users"></i> 线索跟进</button>
    <button class="ntab" onclick="switchTab('inventory')"><i class="ti ti-package"></i> 库存管理</button>
    <button class="ntab" onclick="switchTab('quote')"><i class="ti ti-file-invoice"></i> 快速报价</button>
    <button class="ntab" onclick="switchTab('quotes')"><i class="ti ti-history"></i> 报价记录</button>
    <button class="ntab" onclick="switchTab('activity')"><i class="ti ti-activity"></i> 动态</button>
  </nav>

  <main class="main">

    <!-- 线索 -->
    <div id="sec-leads" class="section active">
      <div class="metrics" id="lead-metrics"></div>
      <div class="card">
        <div class="tb">
          <input class="si" type="text" placeholder="搜索公司名 / 国家..." oninput="filterLeads(this.value)" id="lead-search">
          <select style="width:auto;flex-shrink:0" onchange="filterLeads(document.getElementById('lead-search').value,this.value)" id="stage-filter">
            <option value="">全部阶段</option>
            <option>初次联系</option><option>有兴趣</option><option>报价中</option><option>谈判</option><option>成交</option><option>流失</option>
          </select>
          <button class="btn btn-primary" onclick="openAddLead()"><i class="ti ti-plus"></i> 新增线索</button>
        </div>
        <table>
          <thead><tr><th>公司</th><th>国家</th><th>类型</th><th>阶段</th><th>需求</th><th>联系方式</th><th>下次跟进</th><th>操作</th></tr></thead>
          <tbody id="leads-table"></tbody>
        </table>
      </div>
    </div>

    <!-- 库存 -->
    <div id="sec-inventory" class="section">
      <div class="card">
        <div class="ch">
          <span class="ct">库存状态 <span id="inv-count" style="font-size:12px;font-weight:400;color:var(--t3)"></span></span>
          <button class="btn btn-primary btn-sm" onclick="openAddStock()"><i class="ti ti-plus"></i> 新增库存</button>
        </div>
        <!-- 筛选栏 -->
        <div class="tb" style="gap:8px;flex-wrap:wrap">
          <input class="si" type="text" id="inv-search" placeholder="搜索机器ID / 型号..." oninput="filterInventory()" style="min-width:160px;max-width:220px">
          <select id="inv-f-status" onchange="filterInventory()" style="width:auto">
            <option value="">全部状态</option>
            <option>在库</option><option>预留</option><option>已售</option><option>维修中</option>
          </select>
          <select id="inv-f-brand" onchange="filterInventory()" style="width:auto">
            <option value="">全部品牌</option>
            <option>Cummins</option><option>Caterpillar</option><option>MTU</option><option>Perkins</option>
          </select>
          <select id="inv-f-warehouse" onchange="filterInventory()" style="width:auto">
            <option value="">全部仓库</option>
            <option>东莞仓</option><option>美国仓</option><option>东南亚仓</option><option>海外仓</option>
          </select>
        </div>
        <div style="overflow-x:auto">
        <table style="min-width:900px">
          <thead><tr>
            <th style="width:60px">图片</th>
            <th>机器ID</th>
            <th>型号 / 品牌</th>
            <th>功率 / 电压 / 频率</th>
            <th>年份 / 运行时</th>
            <th>仓库</th>
            <th>参考价 (USD)</th>
            <th>状态</th>
            <th>操作</th>
          </tr></thead>
          <tbody id="inv-table"></tbody>
        </table>
        </div>
      </div>
    </div>

    <!-- 报价 -->
    <div id="sec-quote" class="section">
      <div class="ql">
        <div class="card">
          <div class="ch"><span class="ct">单证配置</span></div>
          <div class="card-body">
            <div class="fcol">
              <div class="fg">
                <label>单证类型</label>
                <div class="doc-tabs">
                  <button class="dtab active" onclick="setDocType('quote',this)">Initial Quote</button>
                  <button class="dtab" onclick="setDocType('pi',this)">Proforma Invoice</button>
                  <button class="dtab" onclick="setDocType('deposit',this)">Deposit PI</button>
                  <button class="dtab" onclick="setDocType('ci',this)">Commercial Invoice</button>
                </div>
              </div>
              <div class="fg"><label>Buyer / Company</label><input type="text" id="q-company" placeholder="Titanium Power Solutions Ltd." oninput="updateQuote()"></div>
              <div class="fg"><label>Buyer Address</label><textarea id="q-address" rows="2" placeholder="123 Industrial Zone, Lagos, Nigeria" oninput="updateQuote()"></textarea></div>
              <div class="fgrid">
                <div class="fg"><label>Port of Destination</label>
                  <select id="q-port" onchange="updateQuote()">
                    <option>Lagos, Nigeria</option><option>Mombasa, Kenya</option><option>Tema, Ghana</option>
                    <option>Dar es Salaam, Tanzania</option><option>Jeddah, Saudi Arabia</option>
                    <option>Dubai, UAE</option><option>Karachi, Pakistan</option><option>Manila, Philippines</option>
                  </select>
                </div>
                <div class="fg"><label>Port of Loading</label>
                  <select id="q-loading" onchange="updateQuote()">
                    <option>Shanghai, China</option><option>Tianjin, China</option>
                    <option>Ningbo, China</option><option>Guangzhou, China</option><option>Shenzhen, China</option>
                  </select>
                </div>
              </div>
              <div class="fg"><label>Select Model</label>
                <select id="q-model" onchange="updateQuote()"><option value="">-- Select from inventory --</option></select>
              </div>
              <div class="fgrid">
                <div class="fg"><label>Quantity</label><input type="number" id="q-qty" value="1" min="1" oninput="updateQuote()"></div>
                <div class="fg"><label>Incoterms 2020</label>
                  <select id="q-inco" onchange="updateQuote()"><option>CIF</option><option>FOB</option><option>EXW</option></select>
                </div>
              </div>
              <div class="fg"><label>Discount (%)</label><input type="number" id="q-disc" value="0" min="0" max="30" oninput="updateQuote()"></div>
              <div class="fg" id="ref-pi-group" style="display:none">
                <label>Reference PI No.</label>
                <input type="text" id="q-ref-pi" placeholder="HXH-PI-20260522-001" oninput="updateQuote()">
              </div>
              <!-- 销售方联系信息（自动记忆） -->
              <div style="border-top:1px solid var(--bdr);padding-top:12px;margin-top:4px">
                <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Sales Contact（打印到单证）</div>
                <div class="fgrid">
                  <div class="fg"><label>姓名</label><input type="text" id="sc-name" placeholder="Mia" oninput="saveSellerContact()"></div>

// ── 机器ID生成 ──────────────────────────────────────────────
function genMachineId() {
  const year = new Date().getFullYear();
  const seq = state.nextMachineSeq || 1;
  state.nextMachineSeq = seq + 1;
  return `HXH-${year}-${String(seq).padStart(3,'0')}`;
}

// ── 旧数据迁移（qty模式 → 一机一档） ────────────────────────
function migrateState(s) {
  if (!s.nextMachineSeq) s.nextMachineSeq = 1;
  if (!s.nextId) s.nextId = 10;
  // 检测是否为旧格式（有qty、无machineId）
  if (s.inventory && s.inventory.length && s.inventory[0].qty !== undefined && !s.inventory[0].machineId) {
    const year = new Date().getFullYear();
    let seq = s.nextMachineSeq;
    let nextId = s.nextId;
    const newInv = [];
    s.inventory.forEach(item => {
      for (let i = 0; i < (item.qty||1); i++) {
        newInv.push({
          id: nextId++,
          machineId: `HXH-${year}-${String(seq++).padStart(3,'0')}`,
          model: item.model, brand: item.brand, power: item.power,
          condition: item.condition,
          status: item.status==='out'?'已售':'在库',
          price: item.price,
          year:'', hours:'', length:'', width:'', height:'', weight:'',
          voltage:'', frequency:'', warehouse:'', image:''
        });
      }
    });
    s.inventory = newInv;
    s.nextMachineSeq = seq;
    s.nextId = nextId;
  }
  return s;
}

function loadState() {
  if (USE_FIREBASE) {
    setSyncStatus('sync');
    db.ref('hxh_crm').on('value', snap => {
      const raw = snap.val();
      if (raw) { try { state = migrateState(JSON.parse(raw)); } catch(e){} }
      setSyncStatus('on');
      render();
    });
  } else {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { try { state = migrateState(JSON.parse(saved)); } catch(e){} }
    setSyncStatus('local');
    render();
  }
}

function saveState() {
  if (USE_FIREBASE) {
    setSyncStatus('sync');
    db.ref('hxh_crm').set(JSON.stringify(state)).then(()=>setSyncStatus('on'));

}

  if(!machineId) return null;
  const item=state.inventory.find(x=>x.machineId===machineId);
  if(!item) return null;
  const qty     =parseInt(document.getElementById('q-qty').value)||1;
  const inco    =document.getElementById('q-inco').value;
  const disc    =parseFloat(document.getElementById('q-disc').value)||0;
  const company =document.getElementById('q-company').value||'Valued Customer';
  const address =document.getElementById('q-address').value||'';
  const port    =document.getElementById('q-port').value;
  const loading =document.getElementById('q-loading').value;
  const refPi   =document.getElementById('q-ref-pi')?.value||'';
  const unitPrice=item.price*(1-disc/100);
  const subtotal =unitPrice*qty;
  const portKey  =port.split(',')[0].trim();
  const freight  =inco==='CIF'?(FREIGHT.CIF[portKey]||3000)*qty:0;
  const total    =subtotal+freight;
  const sc=getSellerContact();
  return {item,qty,inco,disc,company,address,port,loading,refPi,unitPrice,subtotal,freight,total,deposit:total*0.3,balance:total*0.7,sc};
}

function generateQuote() {
  const v=calcValues();
  if(!v){alert('Please select a machine first.');return;}
  const prefixes={quote:'Q',pi:'PI',deposit:'DPI',ci:'CI'};
  const labels={quote:'Quotation',pi:'Proforma Invoice',deposit:'Deposit PI',ci:'Commercial Invoice'};
  const no=docNo(prefixes[docType]);
  state.nextDocSeq=(state.nextDocSeq||1)+1;
  if(!state.quotes) state.quotes=[];
  state.quotes.unshift({
    id:state.nextId++, no, docType,
    date:new Date().toISOString().split('T')[0],
    customer:v.company, machineId:v.item.machineId, model:v.item.model,

  saveState();render();
  alert(`已存档：${no}`);
}

function machineSpecBlock(item) {
  const specs=[];
  if(item.machineId) specs.push(`Machine ID: <strong>${item.machineId}</strong>`);
  if(item.year) specs.push(`Year: ${item.year}`);
  if(item.hours) specs.push(`Running Hours: ${Number(item.hours).toLocaleString()} h`);
  if(item.voltage||item.frequency) specs.push(`Voltage / Freq.: ${[item.voltage,item.frequency].filter(Boolean).join(' / ')}`);
  if(item.length&&item.width&&item.height) specs.push(`Dimensions (L×W×H): ${item.length}m × ${item.width}m × ${item.height}m`);
  if(item.weight) specs.push(`Net Weight: ${Number(item.weight).toLocaleString()} kg`);
  return specs.length ? `<span style="font-size:11px;color:#555">${specs.join('<br>')}</span>` : '';
}

      </td>

  `).join('');

function updateQuoteStatus(id, status) {
  const q=(state.quotes||[]).find(x=>x.id===id);if(!q)return;
  q.status=status;
  addActivity(`报价 ${q.no} 状态→${status}`,'system');
  saveState();
}

function deleteQuote(id) {
  if(!confirm('确认删除此报价记录？'))return;
  state.quotes=(state.quotes||[]).filter(x=>x.id!==id);
  saveState();renderQuoteHistory();
}

function reuseQuote(id) {
  const q=(state.quotes||[]).find(x=>x.id===id);if(!q)return;
  switchTab('quote');
  setTimeout(()=>{
    document.getElementById('q-company').value=q.customer||'';
    document.getElementById('q-inco').value=q.inco||'CIF';
    const sel=document.getElementById('q-model');
    if(sel){sel.value=q.machineId||'';if(!sel.value){populateModelSelect();sel.value=q.machineId||'';}}
    // 切换单证类型
    const dtypeMap={quote:0,pi:1,deposit:2,ci:3};
    const dtabs=document.querySelectorAll('.dtab');
    if(dtabs[dtypeMap[q.docType]]) dtabs[dtypeMap[q.docType]].click();
    updateQuote();
  },80);
}

let _pendingImage = null; // 临时存待保存的图片base64

function handleImageUpload(inputEl, previewId) {
  const file = inputEl.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const MAX = 900;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      _pendingImage = canvas.toDataURL('image/jpeg', 0.72);
      const prev = document.getElementById(previewId);
      if (prev) { prev.src = _pendingImage; prev.style.display = 'block'; }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function warehouseOptions(selected='') {

}

    brand:document.getElementById('ns-brand').value,

  });
  _pendingImage=null;
  addActivity(`新增库存：${mid} ${m}`,'system');saveState();closeModal();render();
}

function saveEditStock(id) {
  const i=state.inventory.find(x=>x.id===id);if(!i)return;
  i.machineId=document.getElementById('es-mid').value||i.machineId;
  i.model=document.getElementById('es-model').value;
  i.brand=document.getElementById('es-brand').value;
  i.power=document.getElementById('es-power').value;
  i.condition=document.getElementById('es-cond').value;
  i.status=document.getElementById('es-status').value;
  i.price=parseInt(document.getElementById('es-price').value)||i.price;
  i.year=document.getElementById('es-year').value;
  i.hours=document.getElementById('es-hours').value;
  i.length=document.getElementById('es-len').value;
  i.width=document.getElementById('es-wid').value;
  i.height=document.getElementById('es-hei').value;
  i.weight=document.getElementById('es-weight').value;
  i.voltage=document.getElementById('es-voltage').value;
  i.frequency=document.getElementById('es-freq').value;
  i.warehouse=getWarehouse('es-warehouse','es-warehouse-custom');
  if(_pendingImage) i.image=_pendingImage;
  _pendingImage=null;
  addActivity(`更新库存：${i.machineId} ${i.model}`,'system');
  saveState();closeModal();render();
}

function deleteStock(id) {
  const i=state.inventory.find(x=>x.id===id);if(!i)return;
  if(!confirm(`确认删除 ${i.machineId} ${i.model}？此操作不可撤销。`))return;
  state.inventory=state.inventory.filter(x=>x.id!==id);
  addActivity(`删除库存：${i.machineId} ${i.model}`,'system');
  saveState();closeModal();render();
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

window._appReady = function() {
  if (USE_FIREBASE) {
    try { firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); } catch(e){}
  }
  loadState();
};
</script>
